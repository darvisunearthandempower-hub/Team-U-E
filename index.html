<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bean Haven Coffee</title>

<link rel="preconnect" href="https://fonts.googleapis.com"&gt;
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap&quot; rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f7efe5;
color:#333;
}

header{
background:#5a3825;
color:white;
padding:30px;
text-align:center;
}

.logo{
font-size:60px;
}

h1{
margin-top:10px;
}

.container{
max-width:900px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
margin-bottom:25px;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.info div{
padding:15px;
background:#fafafa;
border-radius:10px;
}

.shortcuts{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
margin-top:25px;
}

.shortcuts a{
text-decoration:none;
background:#6f4e37;
color:white;
padding:18px;
border-radius:12px;
text-align:center;
font-size:18px;
transition:.3s;
}

.shortcuts a:hover{
background:#8b5e3c;
transform:scale(1.05);
}

footer{
text-align:center;
padding:20px;
background:#5a3825;
color:white;
margin-top:30px;
}
</style>
</head>

<body>

<header>

<div class="logo">☕</div>

<h1>Bean Haven Coffee</h1>

<p>Fresh Coffee • Fresh Morning</p>

</header>

<div class="container">

<div class="card">

<h2>Store Information</h2>

<div class="info">

<div>
<h3>📍 Location</h3>
<p id="location"></p>
</div>

<div>
<h3>🕒 Hours</h3>
<p>Monday - Friday</p>
<p><strong>7:00 AM - 8:00 PM</strong></p>
</div>

<div>
<h3>📞 Phone</h3>
<p>(555) 203-4491</p>
</div>

<div>
<h3>📧 Email</h3>
<p>hello@beanhaven.com</p>
</div>

</div>

</div>

<div class="card">

<h2>Quick Shortcuts</h2>

<div class="shortcuts">

<a href="https://maps.google.com&quot; target="_blank">
🗺️ Maps
</a>

<a href="tel:+15552034491">
📞 Call
</a>

<a href="hello@beanhaven.com">
📧 Email
</a>

<a href="https://instagram.com&quot; target="_blank">
📸 Instagram
</a>

<a href="https://facebook.com&quot; target="_blank">
👍 Facebook
</a>

<a href="https://www.google.com/search?q=coffee&quot; target="_blank">
☕ Menu
</a>

</div>

</div>

</div>

<footer>

© 2026 Bean Haven Coffee

</footer>

<script>

const locations=[
"Seattle, Washington",
"Austin, Texas",
"Chicago, Illinois",
"Boston, Massachusetts",
"Portland, Oregon",
"San Diego, California",
"Denver, Colorado",
"Nashville, Tennessee",
"Miami, Florida",
"Phoenix, Arizona"
];

const randomLocation=locations[Math.floor(Math.random()*locations.length)];

document.getElementById("location").textContent=randomLocation;

</script>

</body>
</html>
